<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Titanic Survival Predictor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🚢 Titanic Survival Predictor</h1>
    <form id="predictForm">
      <label>Class (1,2,3):</label>
      <input type="number" id="pclass" required><br><br>

      <label>Sex (male/female):</label>
      <input type="text" id="sex" required><br><br>

      <label>Age:</label>
      <input type="number" id="age" required><br><br>

      <button type="submit">Predict</button>
    </form>

    <div id="resultBox">
      <h2 id="result"></h2>
      <div class="progress">
        <div id="probBar"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
